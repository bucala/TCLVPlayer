<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCLVPlayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">TV</div>
          <div>
            <h1>TCLVPlayer</h1>
            <p data-i18n="tagline">Jednoduchý IPTV prehrávač</p>
          </div>
        </div>
        <nav class="top-actions">
          <button id="epgToggle" class="epg-toggle" aria-label="EPG" aria-pressed="false">EPG</button>
          <button id="menuToggle" class="icon-button" aria-label="Nastavenia" aria-expanded="false" aria-controls="settingsPanel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </nav>
      </header>
      <div id="settingsOverlay" class="settings-overlay" hidden></div>
      <aside id="settingsPanel" class="settings-panel" hidden aria-label="Nastavenia">
        <div class="settings-header">
          <h2>Nastavenia</h2>
          <button id="settingsClose" class="icon-button" aria-label="Zavrieť">✕</button>
        </div>
        <div class="settings-section">
          <h3 data-i18n="settingsPlayer">Prehrávač & Jazyk</h3>
          <div class="settings-body">
            <label class="field-label"><span data-i18n="labelPlayer">Prehrávač</span><select id="playerSelect" aria-label="Player"><option value="html5">HTML5</option><option value="videojs">Video.js</option><option value="artplayer">ArtPlayer</option><option value="mpv">MPV</option><option value="vlc">VLC</option></select></label>
            <label class="field-label"><span data-i18n="labelLanguage">Jazyk</span><select id="languageSelect" aria-label="Language"><option value="sk">Slovenčina</option><option value="en">English</option></select></label>
          </div>
        </div>
        <div class="settings-section">
          <h3 data-i18n="settingsNetwork">Sieť</h3>
          <div class="settings-body">
            <label class="field-label"><span data-i18n="labelCorsProxy">CORS proxy (len web)</span><input id="corsProxy" type="text" placeholder="https://pro.cors.lol/?token=TOKEN&url=" /></label>
            <p class="settings-hint" data-i18n="corsHint">URL prefix s &url= na konci. Electron a Android ho nepotrebujú.</p>
          </div>
        </div>
        <div class="settings-section">
          <h3 data-i18n="settingsPlaylists">Playlisty</h3>
          <div class="settings-body">
            <div class="field-row"><input id="playlistUrl" type="url" placeholder="https://.../playlist.m3u8" /><button id="addPlaylistUrl" type="button" data-i18n="addPlaylist">Pridať URL</button></div>
            <label class="file-button"><input id="playlistFile" type="file" accept=".m3u,.m3u8,.xspf,audio/x-mpegurl,application/xspf+xml" /><span data-i18n="openPlaylist">Otvoriť súbor</span></label>
            <div id="playlistList" class="source-list"></div>
          </div>
        </div>
        <div class="settings-section">
          <h3 data-i18n="settingsEpg">EPG zdroje</h3>
          <div class="settings-body">
            <p class="settings-hint" data-i18n="epgHint">Všetky zdroje sa načítajú a zlúčia.</p>
            <div class="field-row"><input id="epgUrl" type="url" placeholder="https://.../epg.xml" /><button id="addEpgUrl" type="button" data-i18n="addEpg">Pridať EPG</button></div>
            <label class="file-button"><input id="epgFile" type="file" accept=".xml,.xmltv,application/xml,text/xml" /><span data-i18n="openEpg">Otvoriť súbor EPG</span></label>
            <div id="epgList" class="source-list"></div>
          </div>
        </div>
      </aside>
      <main class="workspace">
        <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle channels">&#x2039;</button>
        <aside class="sidebar" id="sidebar"><section class="channel-grid" id="channelGrid" aria-live="polite"></section></aside>
        <section class="content"><section class="player-stage"><video id="videoPlayer" controls playsinline></video><div id="artPlayerHost" class="art-player-host"></div><div id="qualityControl" class="quality-control" hidden><select id="qualitySelect" aria-label="Kvalita videa"></select></div><div id="playerMessage" class="player-message"></div><div id="switchOverlay" class="switch-overlay" aria-live="polite"></div></section><section class="guide-panel" id="guidePanel" hidden><div class="section-title"><h2 data-i18n="guide">Program</h2><input id="epgSearch" type="search" class="epg-search" data-i18n-placeholder="searchEpg" placeholder="Hľadať v programe" /><div id="guideRange" class="muted"></div></div><div id="epgGuide" class="epg-guide"></div></section></section>
      </main>
    </div>
    <input id="logoFile" type="file" accept="image/*" hidden />
    <template id="channelTemplate"><article class="channel-card"><button class="logo-action" type="button" title="Logo">+</button><img class="channel-logo" alt="" /><div class="channel-text"><h3></h3><p></p></div><div class="progress-track"><span></span></div></article></template>
    <script src="./app.js"></script>
  </body>
</html>
