name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npm run android:setup

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare APK artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk tclvplayer-android-unsigned.apk
          zip tclvplayer-android-unsigned.apk.zip tclvplayer-android-unsigned.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            tclvplayer-android-unsigned.apk
            tclvplayer-android-unsigned.apk.zip

  windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows distributables
        run: npm run windows:dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            dist/*.exe

  release:
    name: Create Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/tclvplayer-android-unsigned.apk
            release-assets/tclvplayer-android-unsigned.apk.zip
            release-assets/*.exe
